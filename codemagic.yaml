workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1

    environment:
      xcode: latest

      ios_signing:
        certificates:
          - certificate.p12
        provisioning_profiles:
          - com.workout.tracker.Workout-Tracker

      vars:
        DEVELOPMENT_TEAM: 5A299U4MF6

    triggering:
      events:
        - push

    scripts:
      - name: Build and Archive
        script: |
          xcodebuild \
          -project "Workout Tracker.xcodeproj" \
          -scheme "Workout Tracker" \
          -configuration Release \
          -archivePath build/Workout.xcarchive \
          DEVELOPMENT_TEAM=$DEVELOPMENT_TEAM \
          archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath build/Workout.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath build/ipa

    artifacts:
      - build/ipa/**/*.ipa
