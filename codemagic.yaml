workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: RemoteXAPI

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workout.tracker.Workout-Tracker

    scripts:
      - name: Build and Archive
        script: |
          xcodebuild \
          -project "Workout Tracker.xcodeproj" \
          -scheme "Workout Tracker" \
          -configuration Release \
          -archivePath build/Workout.xcarchive \
          archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath build/Workout.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath build/ipa

    artifacts:
      - build/ipa/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
