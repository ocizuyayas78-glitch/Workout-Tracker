workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: RemoteXAPI

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workout.tracker.Workout-Tracker

    scripts:
      - name: Set Team ID
        script: |
          /usr/libexec/PlistBuddy -c "Set :objects:$(/usr/libexec/PlistBuddy -c 'Print :rootObject' Workout\ Tracker.xcodeproj/project.pbxproj):attributes:TargetAttributes:$(/usr/libexec/PlistBuddy -c 'Print :objects' Workout\ Tracker.xcodeproj/project.pbxproj | grep -B 1 'Workout Tracker' | head -n 1 | awk '{print $1}'):DevelopmentTeam 5A299U4MF6" Workout\ Tracker.xcodeproj/project.pbxproj || true

      - name: Build and Archive
        script: |
          xcodebuild \
          -project "Workout Tracker.xcodeproj" \
          -scheme "Workout Tracker" \
          -configuration Release \
          -archivePath build/Workout.xcarchive \
          archive

      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
          -archivePath build/Workout.xcarchive \
          -exportOptionsPlist exportOptions.plist \
          -exportPath build/ipa

    artifacts:
      - build/ipa/**/*.ipa

    publishing:
      app_store_connect:
        auth: integration
