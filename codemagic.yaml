workflows:
  ios-workflow:
    name: iOS Build
    instance_type: mac_mini_m1

    integrations:
      app_store_connect: RemoteXAPI

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.workout.tracker.Workout-Tracker

    scripts:
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "Workout Tracker.xcodeproj" \
            --scheme "Workout Tracker"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
